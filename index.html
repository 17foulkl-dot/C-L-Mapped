<!DOCTYPE html>



<html lang="en">



<head>



<meta charset="UTF-8">



<meta name="viewport" content="width=device-width, initial-scale=1.0">



<title>Mapped C&L</title>



<link rel="preconnect" href="https://fonts.googleapis.com">



<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600;700&family=Jost:wght@300;400;500&display=swap" rel="stylesheet">



<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>



<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>



<style>



body { margin:0; font-family:'Jost',sans-serif; background:#f4efe6; color:#222; }



header { display:flex; justify-content:space-between; padding:15px 20px; background:white; border-bottom:1px solid #ddd; }



#map { position:fixed; top:70px; left:300px; right:0; bottom:0; }



.sidebar { position:fixed; top:70px; left:0; bottom:0; width:300px; background:white; overflow:auto; border-right:1px solid #ddd; padding:10px; }



.place { padding:10px; border-bottom:1px solid #eee; cursor:pointer; }



.place:hover { background:#fafafa; }



input, textarea { width:100%; margin:5px 0; padding:8px; }



button { padding:8px 12px; margin-top:5px; cursor:pointer; }



</style>



</head>



<body>



<header>



<div><strong>Mapped C&L</strong></div>



<div>



<button onclick="startPlacing()">Add Pin</button>



</div>



</header>



<div class="sidebar">



<input id="search" placeholder="Search..." oninput="renderList()">



<div id="list"></div>



</div>



<div id="map"></div>



<script>



// ================= CONFIG =================



const BIN_ID = 'PASTE_YOUR_BIN_ID_HERE';



const API_KEY = 'PASTE_YOUR_API_KEY_HERE';



const BIN_URL = `https://api.jsonbin.io/v3/b/${BIN_ID}`;



// ================= STATE =================



let places = [];



let map;



let placing = false;



let pendingLatLng = null;



let activeId = null;



let saveQueue = Promise.resolve();



// ================= MAP =================



window.onload = () => {



  map = L.map('map').setView([30,0],2);



  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {



    maxZoom:19



  }).addTo(map);



  map.on('click', (e)=>{



    if(!placing) return;



    pendingLatLng = e.latlng;



    placing=false;



    openForm();



  });



  loadPlaces();



};



// ================= LOAD =================



async function loadPlaces(){



  try{



    const r = await fetch(`${BIN_URL}/latest?meta=false&cb=${Date.now()}`, {



      headers:{'X-Master-Key':API_KEY}



    });



    const data = await r.json();



    places = data.places || [];



  }catch(e){



    console.log("load fail",e);



    places=[];



  }



  render();



}



// ================= SAVE =================



function queueSave(){



  saveQueue = saveQueue.then(savePlaces);



}



async function savePlaces(){



  try{



    await fetch(BIN_URL,{



      method:'PUT',



      headers:{



        'Content-Type':'application/json',



        'X-Master-Key':API_KEY



      },



      body: JSON.stringify({places})



    });



  }catch(e){



    alert("Save failed - check JSONBin setup");



  }



}



// ================= UI =================



function render(){



  renderList();



  renderMarkers();



}



function renderList(){



  const q = document.getElementById("search").value.toLowerCase();



  const list = document.getElementById("list");



  list.innerHTML="";



  places



    .filter(p=>p.name.toLowerCase().includes(q))



    .forEach(p=>{



      const div = document.createElement("div");



      div.className="place";



      div.innerHTML = `<strong>${p.name}</strong><br>${p.address||""}`;



      div.onclick = ()=>showDetail(p.id);



      list.appendChild(div);



    });



}



let markers={};



function renderMarkers(){



  Object.values(markers).forEach(m=>map.removeLayer(m));



  markers={};



  places.forEach(p=>{



    const m = L.marker([p.lat,p.lng]).addTo(map);



    m.on("click",()=>showDetail(p.id));



    markers[p.id]=m;



  });



}



// ================= ADD =================



function startPlacing(){



  placing=true;



}



function openForm(edit=null){



  const name = prompt("Place name:");



  if(!name) return;



  const address = prompt("Address:");



  const website = prompt("Website (optional):");



  const note = prompt("Note:");



  if(edit){



    edit.name=name;



    edit.address=address;



    edit.website=website;



    edit.note=note;



  }else{



    places.push({



      id:Date.now(),



      name,address,website,note,



      lat:pendingLatLng.lat,



      lng:pendingLatLng.lng



    });



  }



  queueSave();



  render();



}



// ================= DETAIL =================



function showDetail(id){



  const p = places.find(x=>x.id===id);



  let link = p.website 



    ? `<a href="${formatUrl(p.website)}" target="_blank">Website</a>`



    : `<a href="https://maps.google.com?q=${p.lat},${p.lng}" target="_blank">Maps</a>`;



  const action = confirm(



    `${p.name}\n\n${p.note||""}\n\nEdit = OK\nCancel = Delete`



  );



  if(action){



    openForm(p);



  }else{



    if(confirm("Delete?")){



      places = places.filter(x=>x.id!==id);



      queueSave();



      render();



    }



  }



}



function formatUrl(url){



  if(!url) return "";



  if(!url.startsWith("http")) return "https://"+url;



  return url;



}



</script>



</body>



</html>
