<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8"/>
<title>Mapped C&L</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<style>
body { margin:0; font-family:sans-serif; }
#map { position:absolute; top:60px; bottom:0; left:250px; right:0; }
.sidebar { position:absolute; top:60px; left:0; bottom:0; width:250px; overflow:auto; background:#f5f5f5; padding:10px; }
.place { padding:8px; border-bottom:1px solid #ddd; cursor:pointer; }
</style>
</head>

<body>

<div style="height:60px;background:#333;color:white;padding:15px;">
Mapped C&L
<button onclick="startPlacing()">Add Pin</button>
</div>

<div class="sidebar">
<input id="search" placeholder="Search..." oninput="render()"/>
<div id="list"></div>
</div>

<div id="map"></div>

<script>
const STORAGE_KEY = 'mapped_places';

let places = [];
let map;
let placing = false;
let pendingLatLng = null;

// ================= INIT =================
window.onload = () => {
map = L.map('map').setView([30,0],2);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

map.on('click', e=>{
if(!placing) return;
pendingLatLng = e.latlng;
placing=false;
openForm();
});

loadPlaces();
};

// ================= STORAGE =================
function loadPlaces(){
const raw = localStorage.getItem(STORAGE_KEY);
places = raw ? JSON.parse(raw) : [];
render();
}

function savePlaces(){
localStorage.setItem(STORAGE_KEY, JSON.stringify(places));
}

// ================= UI =================
function render(){
renderList();
renderMarkers();
}

function renderList(){
const q = document.getElementById("search").value.toLowerCase();
const list = document.getElementById("list");
list.innerHTML="";

places
.filter(p=>p.name.toLowerCase().includes(q))
.forEach(p=>{
const div = document.createElement("div");
div.className="place";
div.innerHTML = `<strong>${p.name}</strong><br>${p.address||""}`;
div.onclick = ()=>showDetail(p.id);
list.appendChild(div);
});
}

let markers = {};

function renderMarkers(){
Object.values(markers).forEach(m=>map.removeLayer(m));
markers={};

places.forEach(p=>{
const m = L.marker([p.lat,p.lng]).addTo(map);
m.on("click",()=>showDetail(p.id));
markers[p.id]=m;
});
}

// ================= ADD =================
function startPlacing(){
placing=true;
}

function openForm(edit=null){
const name = prompt("Name:");
if(!name) return;

const address = prompt("Address:");
const website = prompt("Website:");
const note = prompt("Note:");

if(edit){
edit.name=name;
edit.address=address;
edit.website=website;
edit.note=note;
}else{
places.push({
id:Date.now(),
name,address,website,note,
lat:pendingLatLng.lat,
lng:pendingLatLng.lng
});
}

savePlaces();
render();
}

// ================= DETAIL =================
function showDetail(id){
const p = places.find(x=>x.id===id);

const link = p.website
? `Website: ${p.website}`
: `Maps: https://maps.google.com?q=${p.lat},${p.lng}`;

const action = confirm(`${p.name}\n\n${p.note||""}\n\n${link}\n\nOK=Edit, Cancel=Delete`);

if(action){
openForm(p);
}else{
if(confirm("Delete?")){
places = places.filter(x=>x.id!==id);
savePlaces();
render();
}
}
}
</script>

</body>
</html>
